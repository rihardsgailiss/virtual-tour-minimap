<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0b0e13; }
  a { color: #1CB0F6; text-decoration: none; }
  a:hover { color: #55c6f8; }
  @keyframes mm-pinIn { 0% { opacity: 0; transform: translateY(6px) scale(.7); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes mm-ring { 0% { transform: scale(.55); opacity: .55; } 100% { transform: scale(2.3); opacity: 0; } }
  @keyframes mm-dotPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.18); } }
  @keyframes mm-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes mm-fade2 { from { opacity: 0; } to { opacity: 1; } }
  @keyframes mm-dotIn { from { transform: scale(.2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes mm-dotBreathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.18); } }
  @keyframes mm-overlayOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(1.06); } }
</style>
</helmet>

<div style="position: relative; width: 100vw; height: 100vh; overflow: hidden; background: #0b0e13; font-family: 'Gilroy', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; user-select: none; display: flex; align-items: center; justify-content: center;">

  <!-- STAGE (phone-sized in Mobile mode, full-bleed otherwise) -->
  <div style="position: relative; overflow: hidden; background: #1a222e; flex: none; {{ stageSize }}">

  <!-- PANORAMA (drag to look around) -->
  <div onPointerDown="{{ onPanoDown }}" onPointerMove="{{ onPanoMove }}" onPointerUp="{{ onPanoUp }}" style="position: absolute; inset: 0; overflow: hidden; cursor: grab; isolation: isolate;">
    <div style="position: absolute; inset: -8%; background-image: url({{ l0Img }}); background-size: cover; background-repeat: no-repeat; background-position: {{ panoPosX }}% 50%; transform: {{ l0T }}; z-index: {{ l0Z }}; animation: {{ l0Anim }}; transition: transform 1.2s cubic-bezier(.4,0,.2,1); will-change: opacity, transform;"></div>
    <div style="position: absolute; inset: -8%; background-image: url({{ l1Img }}); background-size: cover; background-repeat: no-repeat; background-position: {{ panoPosX }}% 50%; transform: {{ l1T }}; z-index: {{ l1Z }}; animation: {{ l1Anim }}; transition: transform 1.2s cubic-bezier(.4,0,.2,1); will-change: opacity, transform;"></div>
    <div style="position: absolute; inset: 0; background: radial-gradient(120% 120% at 50% 40%, rgba(0,0,0,0) 55%, rgba(11,14,19,.28) 100%); pointer-events: none;"></div>
  </div>

  <!-- IN-SCENE HOTSPOTS -->
  <sc-for list="{{ hotspots }}" as="hs">
    <div onClick="{{ hs.onClick }}" title="{{ hs.title }}" style="position: absolute; left: {{ hs.left }}px; top: {{ hs.top }}px; width: 40px; height: 40px; cursor: pointer; opacity: .92;">
      <div style="position: absolute; left: 5px; top: 5px; width: 30px; height: 30px; border-radius: 50%; background: {{ accent }}; box-shadow: inset 0 0 0 2px #fff, 0 4px 10px rgba(26,34,46,.4);"></div>
      <div style="position: absolute; left: 11px; top: 11px; width: 18px; height: 18px; background-color: #fff; -webkit-mask: url({{ hs.icon }}) center / contain no-repeat; mask: url({{ hs.icon }}) center / contain no-repeat; pointer-events: none;"></div>
    </div>
  </sc-for>

  <!-- A/B MODE SWITCH -->
  <div style="position: absolute; top: 24px; left: 24px; z-index: 6; display: flex; gap: 3px; padding: 3px; border-radius: 8px; background: rgba(26,34,46,.28); backdrop-filter: blur(6px);">
    <div onClick="{{ setA }}" title="A — hover darkens the room" style="width: 34px; height: 34px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 700; font-size: 15px; background: {{ aBg }}; color: {{ aColor }};">A</div>
    <div onClick="{{ setB }}" title="B — hover shows snapping points" style="width: 34px; height: 34px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 700; font-size: 15px; background: {{ bBg }}; color: {{ bColor }};">B</div>
    <div onClick="{{ setMobile }}" title="Mobile — phone viewport" style="width: 34px; height: 34px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 700; font-size: 15px; background: {{ mBg }}; color: {{ mColor }};">M</div>
  </div>

  <!-- TOP-RIGHT CONTROLS -->
  <div style="position: absolute; top: 24px; right: 24px; display: flex; gap: 16px; align-items: center;">
    <div style="width: 40px; height: 40px; border-radius: 8px; background: rgba(26,34,46,.28); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative;">
      <img src="assets/ic-info.svg" alt="" style="width: 30px; height: 30px;" />
      <span style="position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; border-radius: 50%; background: #F2C94C;"></span>
    </div>
    <div style="width: 40px; height: 40px; border-radius: 8px; background: rgba(26,34,46,.28); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; cursor: pointer;">
      <img src="assets/ic-hotspot-off.svg" alt="" style="width: 30px; height: 30px;" />
    </div>
    <div style="width: 40px; height: 40px; border-radius: 8px; background: rgba(26,34,46,.28); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; cursor: pointer;">
      <img src="assets/ic-measure.svg" alt="" style="width: 30px; height: 30px;" />
    </div>
    <div style="width: 40px; height: 40px; border-radius: 8px; background: rgba(26,34,46,.28); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; cursor: pointer;">
      <img src="assets/ic-fullscreen.svg" alt="" style="width: 30px; height: 30px;" />
    </div>
  </div>

  <!-- BOTTOM TOOLBAR -->
  <div style="position: absolute; left: 16px; bottom: 16px; display: flex; gap: 8px; align-items: center;">
    <div title="Map" style="width: 40px; height: 40px; border-radius: 8px; background: rgba(26,34,46,.28); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; cursor: pointer;">
      <img src="assets/ic-map.svg" alt="map" style="width: 24px; height: 26px;" />
    </div>
    <div title="Building" style="width: 40px; height: 40px; border-radius: 8px; background: rgba(26,34,46,.28); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; cursor: pointer;">
      <img src="assets/ic-building.svg" alt="building" style="width: 30px; height: 30px;" />
    </div>
    <div style="display: flex; align-items: center; gap: 4px; height: 40px; padding: 0 6px; border-radius: 8px; background: rgba(26,34,46,.28); backdrop-filter: blur(6px);">
      <div title="Lower floor" style="width: 30px; height: 30px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
        <img src="assets/ic-down.svg" alt="lower floor" style="width: 24px; height: 24px;" />
      </div>
      <div style="display: flex; align-items: center; gap: 4px; padding: 0 2px;">
        <span style="color: #fff; font-weight: 700; font-size: 18px;">1</span>
        <img src="assets/ic-floors.svg" alt="floor" style="width: 22px; height: 22px;" />
      </div>
      <div title="Upper floor" style="width: 30px; height: 30px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
        <img src="assets/ic-up.svg" alt="upper floor" style="width: 24px; height: 24px;" />
      </div>
    </div>
  </div>

  <!-- MINIMAP -->
  <div style="position: absolute; left: 16px; bottom: 80px; width: 360px; height: 360px;">
    <!-- disc -->
    <div style="position: absolute; inset: 0; border-radius: 50%; background: rgba(20,26,36,.34); backdrop-filter: blur(3px); box-shadow: 0 10px 30px rgba(11,14,19,.35);"></div>

    <!-- clipped floorplan art (rotates with the view) -->
    <div style="position: absolute; inset: 0; border-radius: 50%; overflow: hidden;">
      <div style="position: absolute; inset: 0; transform: translate({{ mmPanX }}px, {{ mmPanY }}px) scale({{ mmZoom }}) rotate({{ mapRot }}deg); transform-origin: 180px 180px;">
        <div style="position: absolute; left: 0; top: 0; width: 264.784px; height: 191.675px; transform: matrix(0.506,-0.862,0.862,0.506,30.273,245.545); transform-origin: 0 0;">
          <sc-for list="{{ rooms }}" as="room" hint-placeholder-count="5">
            <svg viewBox="0 0 {{ room.w }} {{ room.h }}" style="position: absolute; left: {{ room.svgLeft }}px; top: {{ room.svgTop }}px; width: {{ room.w }}px; height: {{ room.h }}px; overflow: visible; pointer-events: none;">
              <path d="{{ room.path }}" fill="{{ room.fill }}" style="pointer-events: none;" />
              <path d="{{ room.path }}" fill="rgba(26,34,46,.10)" style="pointer-events: none; mix-blend-mode: multiply; opacity: {{ room.hoverOpacity }}; transition: opacity .18s ease;" />
              <sc-if value="{{ room.unavail }}" hint-placeholder-val="{{ false }}">
                <defs>
                  <pattern id="mm-hatch" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
                    <line x1="0" y1="0" x2="0" y2="5" stroke="#1A222E" stroke-width="1.5" stroke-opacity="0.15" />
                  </pattern>
                </defs>
                <path d="{{ room.path }}" fill="url(#mm-hatch)" style="pointer-events: none;" />
              </sc-if>
            </svg>
          </sc-for>
          <x-import component-from-global-scope="FloorplanArt" from="./FloorplanArt.jsx" hint-size="264.784px,191.675px" style="position: absolute; left: 0; top: 0;"></x-import>
        </div>
      </div>
    </div>

    <!-- pin layer (rotates with the view, clipped to the frame) -->
    <div style="position: absolute; inset: 0; pointer-events: none; border-radius: 50%; overflow: hidden;">
      <div style="position: absolute; inset: 0; transform: translate({{ mmPanX }}px, {{ mmPanY }}px) scale({{ mmZoom }}) rotate({{ mapRot }}deg); transform-origin: 180px 180px;">
        <div style="position: absolute; left: 0; top: 0; width: 264.784px; height: 191.675px; transform: matrix(0.506,-0.862,0.862,0.506,30.273,245.545); transform-origin: 0 0;">

          <!-- mode A: circle under the cursor previewing the drop area (dot-styled, larger) -->
          <sc-if value="{{ cursorPt }}" hint-placeholder-val="{{ false }}">
            <div style="position: absolute; left: {{ cursorPt.x }}px; top: {{ cursorPt.y }}px; transform: matrix(0.506,0.862,-0.862,0.506,0,0); transform-origin: 0 0;">
              <div style="position: absolute; left: {{ cursorPt.off }}px; top: {{ cursorPt.off }}px; width: {{ cursorPt.d }}px; height: {{ cursorPt.d }}px; border-radius: 50%; box-shadow: 0 0 0 {{ cursorPt.bw }}px #1a222e; transition: width .28s cubic-bezier(.22,1,.36,1), height .28s cubic-bezier(.22,1,.36,1), left .28s cubic-bezier(.22,1,.36,1), top .28s cubic-bezier(.22,1,.36,1);"></div>
            </div>
          </sc-if>

          <!-- snapping points defined per room (mode B) -->
          <sc-for list="{{ hoverDots }}" as="hd">
            <div style="position: absolute; left: {{ hd.x }}px; top: {{ hd.y }}px; transform: matrix(0.506,0.862,-0.862,0.506,0,0) scale({{ invZoom }}); transform-origin: 0 0; opacity: {{ dotsOpacity }}; transition: opacity .4s ease;">
              <img src="assets/dot.svg" width="16" height="16" style="position: absolute; left: -8px; top: -8px; animation: mm-dotIn .28s cubic-bezier(.34,1.56,.64,1) both; animation-delay: {{ hd.delay }};" />
            </div>
          </sc-for>

          <!-- destination preview pin (no label until arrival) -->
          <sc-if value="{{ pending }}" hint-placeholder-val="{{ false }}">
            <div style="position: absolute; left: {{ pending.x }}px; top: {{ pending.y }}px; transform: matrix(0.506,0.862,-0.862,0.506,0,0) scale({{ invZoom }}); transform-origin: 0 0;">
              <div style="position: absolute; left: -22px; top: -22px; width: 44px; height: 44px; border-radius: 50%; background: rgba(26,34,46,.28); animation: mm-ring 1.1s ease-out infinite;"></div>
              <img src="uploads/Pin-location.svg" width="24" height="30" style="position: absolute; left: -12px; top: -18px; transform: rotate({{ coneRot }}deg); transform-origin: 12px 18px; animation: mm-pinIn .4s cubic-bezier(.2,.8,.3,1.2) both;" />
            </div>
          </sc-if>

          <!-- current location pin + room name beside it -->
          <sc-if value="{{ current }}" hint-placeholder-val="{{ false }}">
            <div style="position: absolute; left: {{ current.x }}px; top: {{ current.y }}px; transform: matrix(0.506,0.862,-0.862,0.506,0,0) scale({{ invZoom }}); transform-origin: 0 0; transition: left .9s cubic-bezier(.4,0,.2,1), top .9s cubic-bezier(.4,0,.2,1); z-index: 3;">
              <img src="uploads/Pin-location.svg" width="24" height="30" style="position: absolute; left: -12px; top: -18px; transform: rotate({{ coneRot }}deg); transform-origin: 12px 18px; transition: transform .12s linear;" />
              <div style="position: absolute; left: 0; top: 0; transform: rotate({{ mapRotNeg }}deg); transform-origin: 0 0;">
                <div style="position: absolute; left: 0; top: 16px; transform: translateX(-50%); background: #fff; color: #1a222e; border-radius: 6px; padding: 4px 10px; white-space: nowrap; font-weight: 700; font-size: 14px;">{{ current.name }} {{ current.area }}</div>
              </div>
            </div>
          </sc-if>

        </div>
      </div>
    </div>

    <!-- grab to pan / scroll to zoom / click to move -->
    <div onPointerDown="{{ onMMDown }}" onPointerMove="{{ onMMMove }}" onPointerUp="{{ onMMUp }}" onPointerCancel="{{ onMMUp }}" onMouseMove="{{ onMMHover }}" onMouseLeave="{{ onMMLeave }}" onWheel="{{ onMMWheel }}" style="position: absolute; inset: 0; border-radius: 50%; cursor: {{ mmCursor }}; z-index: 5; touch-action: none;"></div>

    <!-- unavailable-room tooltip (follows cursor) -->
    <sc-if value="{{ tooltip }}" hint-placeholder-val="{{ false }}">
      <div style="position: absolute; left: {{ tooltip.x }}px; top: {{ tooltip.y }}px; z-index: 8; pointer-events: none;">
        <div style="display: flex; align-items: center; gap: 8px; opacity: .95; border-radius: 6px; background: rgb(72,83,99); padding: 4px 10px 5px 10px; white-space: nowrap;">
          <span style="font-weight: 700; font-size: 12px; line-height: 15px; letter-spacing: 0.01em; color: #fff;">Room not available on tour</span>
        </div>
      </div>
    </sc-if>
  </div>

  <!-- MOBILE ONBOARDING OVERLAY (Figma "Tutorial animation") — covers the minimap, tap to dismiss -->
  <sc-if value="{{ showTutorial }}" hint-placeholder-val="{{ false }}">
    <div onClick="{{ dismissTutorial }}" style="position: absolute; left: 16px; bottom: 80px; width: 360px; height: 360px; border-radius: 50%; z-index: 20; background: radial-gradient(circle at 50% 50%, rgba(26,34,46,.62) 0%, rgba(26,34,46,.34) 60%, rgba(26,34,46,0) 100%); backdrop-filter: blur(2px); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; animation: {{ tutorialAnim }};">
      <img src="uploads/ced7565297fd102040c824b049bfe3d410afba13.gif" alt="" style="width: 120px; height: 60px; object-fit: contain;" />
      <div style="width: 250px; font-weight: 700; font-size: 16px; line-height: 24px; text-align: center; color: #fff;">Tap anywhere on the plan to move around the property</div>
    </div>
  </sc-if>

  </div>
  <!-- /STAGE -->


</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1920, &quot;height&quot;: 1080}, &quot;accent&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#1CB0F6&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#1CB0F6&quot;, &quot;#2A6FDB&quot;, &quot;#1F8A5B&quot;, &quot;#E9615A&quot;], &quot;section&quot;: &quot;Minimap&quot;}, &quot;navStyle&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;fade-then-travel&quot;, &quot;options&quot;: [&quot;fade-then-travel&quot;, &quot;snap&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Minimap&quot;}}">
class Component extends DCLogic {
  state = { cur: null, pending: null, navigating: false, yaw: 0, drag: null, mmZoom: 1, mmPanX: 0, mmPanY: 0, layers: [{ img: 'assets/pano-living.png', t: 'scale(1.06) translate(0%,0%)' }, { img: 'assets/pano-living.png', t: 'scale(1.06) translate(0%,0%)' }], front: 0, fadeN: 0, hoveredRoom: null, mode: 'A', hoverDots: [], tutorialSeen: false };

  setMode = (m) => () => this.setState({ mode: m, hoveredRoom: null, hoverDots: [], cursorPt: null, tutorialSeen: m === 'M' ? false : this.state.tutorialSeen });
  dismissTutorial = () => {
    if (this.state.tutorialSeen || this.state.tutorialClosing) return;
    this.setState({ tutorialClosing: true });
    setTimeout(() => this.setState({ tutorialSeen: true, tutorialClosing: false }), 320);
  };
  stopEv = (e) => e.stopPropagation();

  _darken(c, f) {
    const m = (c || '').match(/\d+/g);
    if (!m) return c;
    return 'rgb(' + m.slice(0, 3).map(n => Math.round(Math.max(0, n * f))).join(',') + ')';
  }

  // blend color toward white by amount t (0..1) — semi-transparent white overlay
  _lighten(c, t) {
    const m = (c || '').match(/\d+/g);
    if (!m) return c;
    return 'rgb(' + m.slice(0, 3).map(n => Math.round(+n + (255 - n) * t)).join(',') + ')';
  }

  // The bathroom has no panorama spots and cannot be travelled to.
  unavailable(id) { return id === 'bath' || id === 'kitchen'; }

  closeTooltip = (e) => { if (e) { e.stopPropagation(); } this.setState({ tooltipSticky: false, tooltipPos: null, overUnavail: false }); };

  // Tooltip position (box-local 360-space), clamped to stay fully on screen.
  _tooltipVals() {
    const active = (this.state.overUnavail || this.state.tooltipSticky) && this.state.tooltipPos;
    if (!active) return null;
    const TW = 186, TH = 24, gap = 14, pad = 6;
    let x = this.state.tooltipPos.x;
    let y = this.state.tooltipPos.y + gap;
    x = Math.max(pad, Math.min(x, 360 - TW - pad));
    y = Math.max(pad, Math.min(y, 360 - TH - pad));
    return { x, y, sticky: !!this.state.tooltipSticky };
  }

  // Fixed snap points per room: a scattered (non-row) pattern; small rooms get 4.
  snapPoints() {
    if (this._snap) return this._snap;
    // big rooms: some points pushed close to the walls (fractions near 0 / 1)
    const big = [[.07, .22], [.5, .08], [.93, .24], [.26, .46], [.6, .4], [.9, .62], [.1, .72], [.46, .91], [.82, .82]];
    const kitchen6 = [[.16, .2], [.48, .14], [.83, .22], [.3, .5], [.63, .46], [.86, .72], [.18, .74], [.55, .8]];
    const small = [[.3, .3], [.72, .34], [.3, .72], [.7, .68]];
    const wide = (fx, fy, r) => ({ x: r.svgLeft + (0.06 + fx * 0.88) * r.w, y: r.svgTop + (0.06 + fy * 0.88) * r.h });
    const out = {};
    for (const r of this.roomDefs()) {
      let pts;
      if (this.unavailable(r.id)) {
        pts = [];
      } else if (r.id === 'hall') {
        pts = [[.1, .32], [.4, .68], [.66, .3], [.9, .66]].map(([fx, fy]) => wide(fx, fy, r));
      } else if (r.id === 'kitchen') {
        pts = kitchen6.map(([fx, fy]) => wide(fx, fy, r));
      } else if (r.id === 'living') {
        // spread + a few tight clusters, kept away from the walls
        pts = [[.1, .2], [.23, .33], [.5, .1], [.78, .28], [.9, .45], [.3, .54], [.62, .48], [.57, .57], [.12, .74], [.44, .88], [.52, .74], [.84, .86]].map(([fx, fy]) => wide(fx, fy, r));
      } else if (r.id === 'bedroom') {
        // scattered, with a couple of tight clusters
        pts = [[.12, .18], [.44, .12], [.72, .2], [.86, .34], [.55, .4], [.3, .55], [.13, .68], [.42, .82], [.83, .8], [.95, .9]].map(([fx, fy]) => wide(fx, fy, r));
      } else {
        pts = big.map(([fx, fy]) => wide(fx, fy, r));
      }
      // keep only points that fall inside the room's own polygon (off the walls)
      out[r.id] = pts.filter(p => { const rm = this.roomAt(p); return rm && rm.id === r.id; });
      // tighten the closest clusters to a consistent 30% overlap (dots are 8px,
      // so a 30% overlap = 5.6px between centres). Pairs already within ~14px are
      // treated as one cluster and pulled toward their centroid until the nearest
      // pair sits at exactly 5.6px.
      this._overlapClusters(out[r.id], 10, 0.3, 14);
    }
    this._snap = out;
    return out;
  }

  // Group points that are within `near` px of each other and rescale each group
  // around its centroid so the tightest pair overlaps by `frac` of `size`.
  _overlapClusters(pts, size, frac, near) {
    const target = size * (1 - frac);          // desired nearest-neighbour distance
    const n = pts.length;
    if (n < 2) return;
    const parent = pts.map((_, i) => i);
    const find = (i) => { while (parent[i] !== i) { parent[i] = parent[parent[i]]; i = parent[i]; } return i; };
    for (let i = 0; i < n; i++) for (let j = i + 1; j < n; j++) {
      if (Math.hypot(pts[i].x - pts[j].x, pts[i].y - pts[j].y) < near) parent[find(i)] = find(j);
    }
    const groups = {};
    for (let i = 0; i < n; i++) { const r = find(i); (groups[r] || (groups[r] = [])).push(i); }
    for (const g of Object.values(groups)) {
      if (g.length < 2) continue;
      const cx = g.reduce((s, i) => s + pts[i].x, 0) / g.length;
      const cy = g.reduce((s, i) => s + pts[i].y, 0) / g.length;
      let dmin = Infinity;
      for (let a = 0; a < g.length; a++) for (let b = a + 1; b < g.length; b++)
        dmin = Math.min(dmin, Math.hypot(pts[g[a]].x - pts[g[b]].x, pts[g[a]].y - pts[g[b]].y));
      if (!isFinite(dmin) || dmin <= target) continue;   // already overlapping enough
      const k = target / dmin;
      for (const i of g) { pts[i].x = cx + (pts[i].x - cx) * k; pts[i].y = cy + (pts[i].y - cy) * k; }
    }
  }

  // hover a room -> mode A darkens its fill; mode B highlights the 3 defined
  // snap points closest to the cursor (points themselves are fixed).
  onMMHover = (e) => {
    if (this.state.mode === 'M') return;   // mobile: tooltip is tap-driven, not hover
    if (this._ptrs && this._ptrs.size) return;
    const r = e.currentTarget.getBoundingClientRect();
    const sc = r.width / 360;
    const f = this.screenToFloor((e.clientX - r.left) / sc, (e.clientY - r.top) / sc);
    let room = this.roomAt(f);
    const overUnavail = !!(room && this.unavailable(room.id));
    if (overUnavail) room = null;   // unavailable room: no hover feedback
    if (overUnavail) {
      const tp = { x: (e.clientX - r.left) / sc, y: (e.clientY - r.top) / sc };
      this.setState({ overUnavail: true, tooltipPos: tp, hoveredRoom: null, hoverDots: [], cursorPt: null });
      return;
    }
    if (this.state.overUnavail) this.setState({ overUnavail: false, tooltipPos: this.state.tooltipSticky ? this.state.tooltipPos : null });
    if (this.state.mode === 'B') {
      const all = room ? (this.snapPoints()[room.id] || []) : [];
      // overlay follows the hovered room; show only the single closest point to the cursor
      let best = null, bd = Infinity;
      for (const p of all) { const d = (p.x - f.x) ** 2 + (p.y - f.y) ** 2; if (d < bd) { bd = d; best = p; } }
      const key = best ? Math.round(best.x) + ',' + Math.round(best.y) : null;
      const roomChanged = (room ? room.id : null) !== this._hoverRoomB;
      if (roomChanged || key !== this._hoverKeyB) {
        this._hoverRoomB = room ? room.id : null;
        this._hoverKeyB = key;
        if (roomChanged) {
          // remount the dot so its entrance animation replays when entering a new room
          cancelAnimationFrame(this._dotRaf);
          this.setState({ hoverDots: [], hoveredRoom: room ? room.id : null, dotsOpacity: 1 });
          if (best) { const b = best; this._dotRaf = requestAnimationFrame(() => this.setState({ hoverDots: [{ x: b.x, y: b.y, delay: '0s' }] })); }
        } else {
          this.setState({ hoverDots: best ? [{ x: best.x, y: best.y, delay: '0s' }] : [], hoveredRoom: room ? room.id : null, dotsOpacity: 1 });
        }
      }
    } else if (this.state.mode === 'A') {
      // mode A: darken the hovered room's fill (8% #1A222E, multiply)
      const id = room ? room.id : null;
      if (id !== this.state.hoveredRoom) this.setState({ hoveredRoom: id, cursorPt: null });
    }
  };
  onMMLeave = () => { this._hoverRoomB = null; this._hoverKeyB = null; if (this.state.overUnavail) this.setState({ overUnavail: false, tooltipPos: null }); if (this.state.hoveredRoom || this.state.hoverDots.length || this.state.cursorPt) this.setState({ hoveredRoom: null, hoverDots: [], cursorPt: null }); };

  // Open-floor "safe" discs per room (container coords) — points inside these
  // stay in the room interior, well clear of the walls.
  safe() {
    return {
      bedroom: { cx: 100, cy: 44,  r: 26 },
      hall:    { cx: 74,  cy: 92,  r: 18 },
      living:  { cx: 86,  cy: 150, r: 26 },
      kitchen: { cx: 214, cy: 151, r: 24 },
      bath:    { cx: 146, cy: 95,  r: 13 },
    };
  }
  nearestRoom(x, y) {
    let best = null, bd = Infinity;
    for (const w of this.waypoints()) {
      const d = (w.x - x) * (w.x - x) + (w.y - y) * (w.y - y);
      if (d < bd) { bd = d; best = w; }
    }
    return best;
  }
  clampToRoom(x, y, room) {
    const s = this.safe()[room.id];
    const vx = x - s.cx, vy = y - s.cy;
    const L = Math.hypot(vx, vy);
    if (L > s.r) { const k = s.r / L; return { x: s.cx + vx * k, y: s.cy + vy * k }; }
    return { x, y };
  }

  componentDidMount() {
    // preload all tour images so switching rooms never shows a black frame
    ['assets/pano-kitchen.png', 'assets/pano-hall.png', 'assets/pano-living.png', 'assets/pano-bedroom.png'].forEach(s => { const im = new Image(); im.src = s; });
    const w = this.wp('living');
    this.setState({ cur: { x: w.x, y: w.y, heading: w.heading, name: w.name, area: w.area, pano: w.pano, img: w.img } });
    this._onResize = () => { if (this.state.mode === 'M') this.forceUpdate(); };
    window.addEventListener('resize', this._onResize);
  }

  componentWillUnmount() { window.removeEventListener('resize', this._onResize); }

  waypoints() {
    return [
      { id: 'bedroom', name: 'Kitchen',     area: '9.80 m²',  x: 100, y: 44,  heading: 285, pano: 'scale(1.18) translate(-3%,-2%)', img: 'assets/pano-kitchen.png' },
      { id: 'hall',    name: 'Hallway',     area: '4.60 m²',  x: 74,  y: 92,  heading: 210, pano: 'scale(1.10) translate(2%,0%)',  img: 'assets/pano-hall.png' },
      { id: 'living',  name: 'Living room', area: '12.05 m²', x: 86,  y: 150, heading: 20,  pano: 'scale(1.06) translate(0%,0%)',  img: 'assets/pano-living.png' },
      { id: 'kitchen', name: 'Bedroom',     area: '14.20 m²', x: 214, y: 151, heading: 150, pano: 'scale(1.16) translate(-4%,1%)',  img: 'assets/pano-bedroom.png' },
      { id: 'bath',    name: 'Bathroom',    area: '3.90 m²',  x: 146, y: 95,  heading: 325, pano: 'scale(1.22) translate(1%,3%)',  img: 'assets/pano-kitchen.png' },
    ];
  }

  roomDefs() {
    return [
      { id: 'bedroom', svgLeft: 6.965,   svgTop: 4.24,   w: 186.594, h: 77.309, base: 'rgb(249,231,219)',
        path: 'M 186.594 10.447 L 185.201 10.447 L 185.201 54.243 L 186.594 54.243 L 186.594 73.048 L 183.808 73.048 L 183.808 77.309 L 165.372 77.309 L 165.372 73.048 L 124.792 73.048 L 124.792 66.636 L 12.352 66.636 L 12.352 46.766 L 8.091 44.37 L 7.374 45.66 L 1.434 42.321 L 2.171 41.031 L 1.475 40.641 L 1.475 39.843 L 0 39.843 L 0 21.611 L 1.475 21.611 L 1.475 20.915 L 2.028 20.526 L 1.168 19.317 L 7.129 15.056 L 7.989 16.265 L 12.352 13.151 L 12.352 0 L 186.594 0 L 186.594 10.447 Z' },
      { id: 'living', svgLeft: 2.848, svgTop: 112.03, w: 164.307, h: 75.342, base: 'rgb(236,233,214)',
        path: 'M 157.793 22.021 L 164.307 22.021 L 164.307 54.387 L 157.793 54.387 L 157.793 75.342 L 16.47 75.342 L 16.47 62.519 L 10.468 59.323 L 9.771 60.634 L 1.536 56.251 L 2.233 54.94 L 1.475 54.53 L 1.475 53.711 L 0 53.711 L 0 26.671 L 1.475 26.671 L 1.475 25.852 L 2.192 25.462 L 1.475 24.151 L 11.717 18.559 L 12.434 19.87 L 16.49 17.658 L 16.49 0 L 157.813 0 L 157.813 22.021 L 157.793 22.021 Z' },
      { id: 'kitchen', svgLeft: 167.032, svgTop: 116.373, w: 94.905, h: 70.979, base: 'rgb(255,247,236)',
        path: 'M 67.865 4.261 L 68.07 4.261 L 68.07 5.654 L 91.955 5.654 L 91.955 4.261 L 93.43 4.261 L 93.43 8.89 L 94.905 8.89 L 94.905 67.947 L 93.43 67.947 L 93.43 70.979 L 90.911 70.979 L 90.911 69.586 L 7.579 69.586 L 7.579 70.979 L 0 70.979 L 0 4.261 L 8.153 4.261 L 8.153 5.654 L 32.243 5.654 L 32.243 4.261 L 32.448 4.261 L 32.448 0 L 67.865 0 L 67.865 4.261 Z' },
      { id: 'bath', svgLeft: 131.758, svgTop: 77.186, w: 28.883, h: 34.926, base: 'rgb(221,228,240)',
        path: 'M 23.742 6.514 L 28.883 6.514 L 28.883 15.609 L 27.49 15.609 L 27.49 27.245 L 28.883 27.245 L 28.883 34.926 L 0 34.926 L 0 0 L 23.742 0 L 23.742 6.514 Z' },
      { id: 'hall', svgLeft: 15.057, svgTop: 70.794, w: 116.803, h: 41.297, base: 'rgb(255,247,236)',
        path: 'M 116.803 41.297 L 4.261 41.297 L 4.261 37.897 L 2.786 37.897 L 2.786 29.785 L 4.261 29.785 L 4.261 29.498 L 0 29.498 L 0 11.062 L 4.261 11.062 L 4.261 10.857 L 2.786 10.857 L 2.786 5.633 L 4.261 5.633 L 4.261 4.158 L 12.229 4.158 L 12.229 0 L 116.783 0 L 116.783 41.297 L 116.803 41.297 Z' },
    ];
  }

  wp(id) { return this.waypoints().find(w => w.id === id); }

  // Ping-pong crossfade: put the new room on the hidden layer (on top) and fade
  // it IN over the still-opaque outgoing layer, so no background ever shows.
  _swapPano(target) {
    const back = 1 - this.state.front;
    const layers = this.state.layers.slice();
    layers[back] = { img: target.img, t: target.pano };
    this.setState({ layers, front: back, fadeN: this.state.fadeN + 1 });
  }

  _go(target) {
    if (this.state.navigating) return;
    const style = this.props.navStyle || 'fade-then-travel';
    // never touch yaw here — the pin keeps its facing across location changes.
    if (style === 'snap') {
      this.setState({ cur: target, pending: null });
      this._swapPano(target);
      return;
    }
    this.setState({ pending: target, navigating: true });
    setTimeout(() => {
      this.setState({ cur: target, pending: null });
      this._swapPano(target);
      setTimeout(() => this.setState({ navigating: false }), 900);
    }, 720);
  }

  navToRoom(id) {
    const w = this.wp(id);
    this._go({ x: w.x, y: w.y, name: w.name, area: w.area, pano: w.pano, img: w.img });
  }

  // Convert a point in the 360x360 minimap box back to floorplan coords,
  // undoing pan, zoom, view-rotation and the base matrix.
  screenToFloor(sx, sy) {
    let X = sx - this.state.mmPanX;
    let Y = sy - this.state.mmPanY;
    X = 180 + (X - 180) / this.state.mmZoom;
    Y = 180 + (Y - 180) / this.state.mmZoom;
    const yr = -this.state.yaw * Math.PI / 180; // map rotates by -yaw
    const ox = X - 180, oy = Y - 180;
    X = 180 + ox * Math.cos(yr) + oy * Math.sin(yr);
    Y = 180 - ox * Math.sin(yr) + oy * Math.cos(yr);
    const dx = X - 30.273, dy = Y - 245.545;
    return { x: 0.506 * dx - 0.862 * dy, y: 0.862 * dx + 0.506 * dy };
  }

  // Which room's fill polygon contains a floorplan point (guarantees the pin
  // lands in the room that was actually clicked).
  roomAt(f) {
    if (!this._hitCtx) { const c = document.createElement('canvas'); c.width = c.height = 1; this._hitCtx = c.getContext('2d'); }
    const ctx = this._hitCtx;
    for (const r of this.roomDefs()) {
      const p = new Path2D(r.path);
      if (ctx.isPointInPath(p, f.x - r.svgLeft, f.y - r.svgTop)) return this.wp(r.id);
    }
    return null;
  }

  // Closest defined snap point to a floorplan point (shared by the mode-A cursor
  // circle and the click-to-move snap, so the two always agree).
  closestSnap(f) {
    const room = this.roomAt(f) || this.nearestRoom(f.x, f.y);
    if (!room) return null;
    const pts = this.snapPoints()[room.id] || [];
    let best = null, bd = Infinity;
    for (const p of pts) { const d = (p.x - f.x) ** 2 + (p.y - f.y) ** 2; if (d < bd) { bd = d; best = p; } }
    return { room, point: best, dist: best ? Math.sqrt(bd) : Infinity };
  }

  moveTo(sx, sy, revealDots) {
    if (this.state.navigating) return;
    if (!this.state.tutorialSeen) this.setState({ tutorialSeen: true });
    const f = this.screenToFloor(sx, sy);
    const cs = this.closestSnap(f);
    const room = cs ? cs.room : (this.roomAt(f) || this.nearestRoom(f.x, f.y));
    if (!room || this.unavailable(room.id)) {   // unavailable: no spots, not travellable
      if (this.state.mode === 'M' && room && this.unavailable(room.id)) {
        this.setState({ tooltipPos: { x: sx, y: sy }, tooltipSticky: true });
        clearTimeout(this._ttTimer);
        this._ttTimer = setTimeout(() => this.setState({ tooltipSticky: false, tooltipPos: null }), 5000);
      }
      return;
    }
    if (this.state.tooltipSticky) this.setState({ tooltipSticky: false, tooltipPos: null });
    const pts = room ? (this.snapPoints()[room.id] || []) : [];
    const dest = (cs && cs.point) || f;
    this._hoverRoomB = null;
    // touch: drop the pin first, THEN fade the room's dots in a beat later
    if (revealDots && this.state.mode === 'B' && pts.length) {
      clearTimeout(this._dotFade); clearTimeout(this._dotClear); clearTimeout(this._dotReveal);
      if (this.state.hoverDots.length || this.state.hoveredRoom) this.setState({ hoverDots: [], hoveredRoom: null });
      this._dotReveal = setTimeout(() => {
        this.setState({ hoverDots: pts.map(p => ({ x: p.x, y: p.y, delay: (Math.random() * 0.12).toFixed(3) + 's' })), dotsOpacity: 1, hoveredRoom: null });
        this._dotFade = setTimeout(() => {
          this.setState({ dotsOpacity: 0 });
          this._dotClear = setTimeout(() => this.setState({ hoverDots: [] }), 450);
        }, 1600);
      }, 320);
    } else if (this.state.hoverDots.length || this.state.hoveredRoom) {
      this.setState({ hoverDots: [], hoveredRoom: null });
    }
    this._go({ x: dest.x, y: dest.y, name: room.name, area: room.area, pano: room.pano, img: room.img });
  }

  _clampPan(x, y, z) {
    const m = (z - 1) * 180;
    return { x: Math.max(-m, Math.min(m, x)), y: Math.max(-m, Math.min(m, y)) };
  }

  // One finger / mouse = drag to pan (a tap with no drag moves the location);
  // two fingers = pinch to zoom (+ pan by the pinch midpoint).
  onMMDown = (e) => {
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
    e.currentTarget.style.cursor = 'grabbing';
    const r = e.currentTarget.getBoundingClientRect();
    this._rect = { left: r.left, top: r.top, sc: r.width / 360 };
    if (!this._ptrs) this._ptrs = new Map();
    this._ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (this._ptrs.size === 1) {
      this._mm = { cx: e.clientX, cy: e.clientY, panx: this.state.mmPanX, pany: this.state.mmPanY, moved: false };
    } else if (this._ptrs.size === 2) {
      const [a, b] = [...this._ptrs.values()];
      this._pinch = { d0: Math.hypot(a.x - b.x, a.y - b.y) || 1, z0: this.state.mmZoom, panx: this.state.mmPanX, pany: this.state.mmPanY, mx: (a.x + b.x) / 2, my: (a.y + b.y) / 2 };
      this._mm = null;
    }
  };
  onMMMove = (e) => {
    if (!this._ptrs || !this._ptrs.has(e.pointerId)) return;
    this._ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
    const sc = this._rect ? this._rect.sc : 1;
    if (this._ptrs.size >= 2 && this._pinch) {
      const [a, b] = [...this._ptrs.values()];
      const d = Math.hypot(a.x - b.x, a.y - b.y);
      const z = Math.max(1, Math.min(3.5, this._pinch.z0 * (d / this._pinch.d0)));
      const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
      const p = this._clampPan(this._pinch.panx + (mx - this._pinch.mx) / sc, this._pinch.pany + (my - this._pinch.my) / sc, z);
      this.setState({ mmZoom: z, mmPanX: p.x, mmPanY: p.y });
    } else if (this._mm) {
      const dx = (e.clientX - this._mm.cx) / sc, dy = (e.clientY - this._mm.cy) / sc;
      if (Math.hypot(dx, dy) > 3) this._mm.moved = true;
      if (this._mm.moved) {
        const p = this._clampPan(this._mm.panx + dx, this._mm.pany + dy, this.state.mmZoom);
        this.setState({ mmPanX: p.x, mmPanY: p.y });
      }
    }
  };
  onMMUp = (e) => {
    if (this._ptrs) this._ptrs.delete(e.pointerId);
    const remaining = this._ptrs ? this._ptrs.size : 0;
    if (remaining >= 1) {
      // dropped from a pinch back to one finger: resume panning from it
      this._pinch = null;
      const [p] = [...this._ptrs.values()];
      this._mm = { cx: p.x, cy: p.y, panx: this.state.mmPanX, pany: this.state.mmPanY, moved: true };
      return;
    }
    e.currentTarget.style.cursor = 'pointer';
    const mm = this._mm; this._mm = null; this._pinch = null;
    if (mm && !mm.moved && this._rect) {
      this.moveTo((e.clientX - this._rect.left) / this._rect.sc, (e.clientY - this._rect.top) / this._rect.sc, e.pointerType === 'touch');
    }
  };
  onMMWheel = (e) => {
    if (e.preventDefault) e.preventDefault();
    const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    const z = Math.max(1, Math.min(3.5, this.state.mmZoom * factor));
    const p = this._clampPan(this.state.mmPanX, this.state.mmPanY, z);
    this.setState({ mmZoom: z, mmPanX: p.x, mmPanY: p.y });
  };

  onPanoDown = (e) => {
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
    e.currentTarget.style.cursor = 'grabbing';
    this.setState({ drag: { x: e.clientX, yaw0: this.state.yaw } });
  };
  onPanoMove = (e) => {
    if (!this.state.drag) return;
    const dx = e.clientX - this.state.drag.x;
    // Damped + limited response: the map lags the drag and eases toward a
    // soft cap (±MAX deg) instead of tracking the cursor 1:1.
    const MAX = 55;      // most the map can swing from where this drag began
    const SOFT = 260;    // px of drag for a near-full swing (higher = slower)
    const delta = MAX * Math.tanh(dx / SOFT);
    this.setState({ yaw: this.state.drag.yaw0 + delta });
  };
  onPanoUp = (e) => {
    e.currentTarget.style.cursor = 'grab';
    this.setState({ drag: null });
  };

  renderVals() {
    const accent = this.props.accent || '#1CB0F6';
    const cur = this.state.cur;
    const pend = this.state.pending;
    const yaw = this.state.yaw;

    const rooms = this.roomDefs().map(r => ({
      w: r.w, h: r.h, svgLeft: r.svgLeft, svgTop: r.svgTop, path: r.path,
      fill: this.state.mode === 'B' ? '#E5E6E8' : r.base,
      hoverOpacity: this.state.hoveredRoom === r.id ? 1 : 0,
      unavail: this.unavailable(r.id),
    }));

    const current = cur ? { x: cur.x, y: cur.y, name: cur.name, area: cur.area } : null;
    const pending = pend ? { x: pend.x, y: pend.y, name: pend.name } : null;

    const hotspots = [
      { left: 1553, top: 611, icon: 'assets/door_open.svg', title: 'Go to Kitchen', onClick: () => this.navToRoom('kitchen') },
      { left: 1650, top: 651, icon: 'assets/stairs_2.svg', title: 'Go to Hallway', onClick: () => this.navToRoom('hall') },
    ];

    const A = this.state.mode === 'A';
    const B = this.state.mode === 'B';
    const M = this.state.mode === 'M';
    const cp = this.state.cursorPt;
    const cursorPt = null;
    const mScale = M ? Math.min(1, (window.innerHeight - 28) / 852) : 1;
    const stageSize = M
      ? 'width: 393px; height: 852px; border-radius: 46px; transform: scale(' + mScale.toFixed(3) + '); box-shadow: 0 0 0 4px #0b0e13, 0 0 0 7px #2b3038, 0 30px 80px rgba(0,0,0,.6);'
      : 'width: 100%; height: 100%;';
    const showTutorial = M && !this.state.tutorialSeen;
    const tutorialAnim = this.state.tutorialClosing ? 'mm-overlayOut .32s ease forwards' : 'mm-fade .3s ease both';
    // mode A: show every room's snap points as static dots (same spots as mode B)
    let allDots = [];
    if (A) { const sp = this.snapPoints(); for (const id in sp) for (const p of sp[id]) allDots.push({ x: p.x, y: p.y }); }
    const hoverDots = this.state.hoverDots.map(d => ({ x: d.x, y: d.y, delay: d.delay || '0s' }));
    const dotsOpacity = this.state.dotsOpacity == null ? 1 : this.state.dotsOpacity;
    const panoPosX = 50 - yaw * 0.14;
    const fr = this.state.front;
    const l0 = this.state.layers[0], l1 = this.state.layers[1];
    const fadeAnim = (this.state.fadeN % 2 ? 'mm-fade2' : 'mm-fade') + ' 1.1s ease both';
    const l0Z = fr === 0 ? 2 : 1, l1Z = fr === 1 ? 2 : 1;
    const l0Anim = fr === 0 ? fadeAnim : 'none';
    const l1Anim = fr === 1 ? fadeAnim : 'none';

    return { accent, rooms, current, pending, hotspots, panoPosX, l0Img: l0.img, l0T: l0.t, l0Z, l0Anim, l1Img: l1.img, l1T: l1.t, l1Z, l1Anim, mapRot: -yaw, mapRotNeg: yaw, coneRot: 2 * yaw,
      invZoom: 1 / this.state.mmZoom,
      mmZoom: this.state.mmZoom, mmPanX: this.state.mmPanX, mmPanY: this.state.mmPanY,
      onMMDown: this.onMMDown, onMMMove: this.onMMMove, onMMUp: this.onMMUp, onMMWheel: this.onMMWheel, onMMHover: this.onMMHover, onMMLeave: this.onMMLeave,
      hoverDots, dotsOpacity, cursorPt, allDots, stageSize, showTutorial, tutorialAnim, dismissTutorial: this.dismissTutorial, stopEv: this.stopEv,
      setA: this.setMode('A'), setB: this.setMode('B'), setMobile: this.setMode('M'),
      aBg: A ? '#fff' : 'transparent', aColor: A ? '#1a222e' : '#fff',
      bBg: B ? '#fff' : 'transparent', bColor: B ? '#1a222e' : '#fff',
      mBg: M ? '#fff' : 'transparent', mColor: M ? '#1a222e' : '#fff',
      onPanoDown: this.onPanoDown, onPanoMove: this.onPanoMove, onPanoUp: this.onPanoUp,
      mmCursor: this.state.overUnavail ? 'default' : 'pointer',
      tooltip: this._tooltipVals(), closeTooltip: this.closeTooltip };
  }
}
</script>
